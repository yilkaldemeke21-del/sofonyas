<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline</title>
    <style>
        body { margin:0; padding:0; font-family: Arial, sans-serif; background:#0f172a; color:#f8fafc; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .card { max-width:520px; text-align:center; padding:32px; background:rgba(15,23,42,0.96); border-radius:24px; box-shadow:0 18px 48px rgba(0,0,0,0.35); }
        h1 { margin-bottom:18px; font-size:2rem; }
        p { margin-bottom:24px; line-height:1.6; color:#cbd5e1; }
        a { display:inline-block; padding:12px 22px; border-radius:999px; background:#2563eb; color:#fff; text-decoration:none; font-weight:700; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Offline Mode</h1>
        <p>ይህ ገጽ ከነገር ይቆማል። በእርዳታ የሚስተናገድ መረጃ እንዲገናኝ ይሞክሩ።</p>
        <a href="./">Return to Home</a>
    </div>
</body>
</html>
